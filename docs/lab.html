<!DOCTYPE html>
<html lang="en">
<head>
  <script>(function(){
    var t = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', t);
  })();</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klyxe — Lab</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta name="description" content="Klyxe Lab — interactive AI visualizations and experiments.">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="style-spacing.css">
  <link rel="stylesheet" href="animations.css">
  <link rel="stylesheet" href="lab.css">
  <script src="app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header class="header" id="app-bar">
  <div class="header-content">
    <a href="index.html" class="logo" style="padding-left:0;margin-left:0;">
      <img src="media/L_logo.png" alt="Klyxe logo" class="logo-icon" style="margin-left:0;">
      <span style="font-size:17px;font-weight:700;letter-spacing:-0.02em;">Klyxe</span>
    </a>
    <div style="flex:1;"></div>
    <div class="theme-switch-wrap">
      <span class="theme-switch-label" id="theme-label">Dark</span>
      <label class="theme-switch" aria-label="Toggle theme">
        <input type="checkbox" id="theme-toggle">
        <span class="theme-switch-track"></span>
        <span class="theme-switch-thumb" id="thumb-icon"></span>
      </label>
    </div>
  </div>
</header>

<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="app-layout">
  <lex-sidebar></lex-sidebar>
  <div class="sidebar-main">

    <div class="hero" style="border-bottom:1px solid rgba(52,211,153,0.15);background:radial-gradient(ellipse at 20% 50%,rgba(16,185,129,0.07) 0%,transparent 60%);">
      <div class="hero-inner">
        <div class="lab-hero-badge">
          <svg width="10" height="10" viewBox="0 0 16 16" fill="none">
            <path d="M6 2v5L3 12a1 1 0 00.9 1.5h8.2A1 1 0 0013 12L10 7V2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M5 2h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          Research Lab
        </div>
        <h1 class="hero-headline" style="font-size:28px;">Visualizations &amp; Experiments</h1>
        <p class="hero-sub" style="color:var(--text-secondary);">
          Interactive demos: in-browser neural networks, API exploration, 3D graphs
        </p>
      </div>
    </div>

    <main class="container">
      <div id="lab-cards" class="lab-cards-grid reveal"></div>
      <section class="reveal" style="margin-top:20px;border:1px solid rgba(52,211,153,.2);border-radius:14px;padding:16px;background:rgba(15,23,42,.35);">
        <h2 style="margin:0 0 8px 0;font-size:18px;">publish to lab</h2>
        <p style="margin:0 0 12px 0;color:var(--text-secondary);font-size:13px;">
          sign in with github and publish your article card for lab feed
        </p>
        <div style="display:grid;gap:10px;">
          <input id="lab-pub-title" class="input" placeholder="article title" />
          <textarea id="lab-pub-summary" class="input" rows="4" placeholder="short summary"></textarea>
          <input id="lab-pub-link" class="input" placeholder="link to article or demo" />
          <div style="display:flex;gap:8px;align-items:center;">
            <button id="lab-pub-btn" class="btn btn-sm">publish</button>
            <span id="lab-pub-status" style="font-size:12px;color:var(--text-secondary);"></span>
          </div>
        </div>
      </section>
    </main>
  </div>
</div>

<script src="lab-publish.js"></script>
<script src="lab-index.js"></script>
<script src="sidebar.js"></script>
</body>
</html>
