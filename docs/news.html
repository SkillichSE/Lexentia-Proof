<!DOCTYPE html>
<html lang="en">
<head>
  <script>(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News — Lexentia Proof</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="style-spacing.css">
  <link rel="stylesheet" href="animations.css">
  <script src="app.js"></script>
</head>
<body>
  <header class="header">
    <div class="header-content">
      <a href="index.html" class="logo"><img src="media/L_logo.png" alt="Lexentia Proof logo" class="logo-icon"><span>Lexentia Proof</span></a>
      <nav class="nav">
        <a href="index.html" class="nav-link">Rankings</a>
        <a href="about.html" class="nav-link">About</a>
        <a href="search.html" class="nav-link">Search</a>
        <a href="providers.html" class="nav-link">Providers</a>
      <a href="trends.html" class="nav-link">Trends</a>
        <a href="news.html" class="nav-link active">News</a>
      </nav>
      <div class="theme-switch-wrap">
        <span class="theme-switch-label" id="theme-label">Dark</span>
        <label class="theme-switch" aria-label="Toggle theme">
          <input type="checkbox" id="theme-toggle">
          <span class="theme-switch-track"></span>
          <span class="theme-switch-thumb" id="thumb-icon">🌙</span>
        </label>
      </div>
    </div>
  </header>
<button class="nav-hamburger" id="nav-hamburger" aria-label="Open navigation">
  <span></span><span></span><span></span>
</button>
<nav class="nav-drawer" id="nav-drawer" style="display:none;">
  <a href="index.html" class="nav-link">Rankings</a>
  <a href="about.html" class="nav-link">About</a>
  <a href="search.html" class="nav-link">Search</a>
  <a href="providers.html" class="nav-link">Providers</a>
  <a href="trends.html" class="nav-link">Trends</a>
  <a href="news.html" class="nav-link active">News</a>
</nav>

<div class="page-hero">
  <div class="page-hero-inner">
    <h1 class="page-hero-title">AI News</h1>
    <p class="page-hero-sub">Latest releases, research, and announcements from AI providers.</p>
  </div>
</div>

  <main class="container">
    <div style="margin-bottom:20px;">
      <span id="last-update" style="font-size:12px;color:var(--text-secondary);"></span>
    </div>

    <div class="filters" id="source-filters" style="margin-bottom:24px;">
      <button class="filter-btn active" data-source="all">All</button>
      <button class="filter-btn" data-source="Hugging Face">Hugging Face</button>
      <button class="filter-btn" data-source="Google AI Blog">Google</button>
      <button class="filter-btn" data-source="OpenAI">OpenAI</button>
      <button class="filter-btn" data-source="Anthropic">Anthropic</button>
      <button class="filter-btn" data-source="NVIDIA Developer">NVIDIA</button>
      <button class="filter-btn" data-source="AWS ML Blog">AWS</button>
      <button class="filter-btn" data-source="Together AI">Together AI</button>
      <button class="filter-btn" data-source="Mistral AI">Mistral</button>
    </div>

    <div id="news-feed"></div>
    <div id="no-news" style="display:none;text-align:center;padding:64px;color:var(--text-secondary);">
      No news yet — check back after the next daily run.
    </div>
  </main>

  <footer class="footer">
    <div class="footer-links">
      <a href="https://skillichse.github.io/Lexentia-Proof/" class="footer-link">GitHub</a>
      <a href="about.html" class="footer-link">About</a>
      <a href="news.html" class="footer-link">News</a>
    </div>
    <p>Free AI models, tested daily</p>
  </footer>

  <script>
    let allNews=[], currentSource='all';

    async function loadNews(){
      try{
        const r=await fetch('data/results/news.json');
        const data=await r.json();
        const el=document.getElementById('last-update');
        if(el) el.textContent='Updated '+new Date(data.updated).toLocaleString();
        allNews=data.items||[];
        
        if(allNews.length === 0){
          document.getElementById('news-feed').innerHTML='';
          document.getElementById('no-news').style.display='block';
          return;
        }
        
        displayNews();
      }catch(e){
        console.error('Error loading news:', e);
        document.getElementById('news-feed').innerHTML='';
        document.getElementById('no-news').style.display='block';
      }
    }

    function displayNews(){
      const feed=document.getElementById('news-feed');
      const none=document.getElementById('no-news');
      const filtered=currentSource==='all'?allNews:allNews.filter(i=>i.source===currentSource);
      
      if(!filtered.length){
        feed.innerHTML='';
        none.style.display='block';
        return;
      }
      
      none.style.display='none';
      feed.innerHTML=filtered.map(item=>`
        <div class="news-item">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
            <span class="news-date">${new Date(item.date).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'})}</span>
            <span style="font-size:11px;font-weight:500;color:var(--text-secondary);">${item.source}</span>
          </div>
          <h3 class="news-title"><a href="${item.link}" target="_blank" rel="noopener">${item.title}</a></h3>
          ${item.summary?`<p class="news-summary">${item.summary}</p>`:''}
        </div>`).join('');
    }

    document.addEventListener('DOMContentLoaded',()=>{
      loadNews();
      document.getElementById('source-filters').addEventListener('click',e=>{
        if(!e.target.classList.contains('filter-btn'))return;
        document.querySelectorAll('#source-filters .filter-btn').forEach(b=>b.classList.remove('active'));
        e.target.classList.add('active');
        currentSource=e.target.dataset.source;
        displayNews();
      });
    });
  </script>
  <script>
    (function(){
      var themeToggle = document.getElementById('theme-toggle');
      var themeLabel  = document.getElementById('theme-label');
      var thumbIcon   = document.getElementById('thumb-icon');
      function applyTheme(t) {
        document.documentElement.setAttribute('data-theme', t);
        localStorage.setItem('theme', t);
        var dark = t === 'dark'; var isLight = !dark;
        themeToggle.checked = isLight;
        themeLabel.textContent = isLight ? 'Light' : 'Dark';
        thumbIcon.textContent = isLight ? '☀️' : '🌙';
      }
      applyTheme(localStorage.getItem('theme') || 'dark');
      themeToggle.addEventListener('change', function() { applyTheme(themeToggle.checked ? 'light' : 'dark'); });
      window.addEventListener('scroll',function(){document.querySelector('.header').classList.toggle('scrolled',window.scrollY>0);});
    })();
  </script>

  <script>
  
  (function() {
    var io = new IntersectionObserver(function(entries) {
      entries.forEach(function(e) {
        if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -30px 0px' });

    function observe() {
      document.querySelectorAll('.reveal:not([data-obs]), .news-item:not([data-obs])').forEach(function(el) {
        el.setAttribute('data-obs','1');
        io.observe(el);
      });
    }
    observe();
    new MutationObserver(observe).observe(document.body, { childList: true, subtree: true });
  })();
  </script>
</body>
</html>
