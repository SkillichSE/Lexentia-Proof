<!DOCTYPE html>
<html lang="en">
<head>
  <script>(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trends — Klyxe</title>
  <meta name="description" content="Score trends and comparisons within each size tier — Large, Medium, Small.">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="style-spacing.css">
  <link rel="stylesheet" href="animations.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    .tier-section { margin-bottom: 64px; }
    .tier-heading {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .tier-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .tier-dot.large  { background: #6366f1; box-shadow: 0 0 8px rgba(99,102,241,0.5); }
    .tier-dot.medium { background: #3b82f6; box-shadow: 0 0 8px rgba(59,130,246,0.5); }
    .tier-dot.small  { background: #10b981; box-shadow: 0 0 8px rgba(16,185,129,0.5); }
    .tier-heading-name { font-size: 20px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.02em; }
    .tier-heading-sub { font-size: 12px; color: var(--text-secondary); font-family: var(--font-mono); margin-left: auto; }

    .insights-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 20px; }
    .insight-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 18px 20px; }
    .insight-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-secondary); margin-bottom: 8px; font-family: var(--font-mono); }
    .insight-value { font-size: 17px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; line-height: 1.2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .insight-value em { font-style: normal; color: var(--accent); }
    .insight-sub { font-size: 11px; color: var(--text-secondary); }

    .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    .chart-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 20px 20px 16px; }
    .chart-card-title { font-size: 13px; font-weight: 700; color: var(--text-primary); margin-bottom: 2px; }
    .chart-card-sub { font-size: 11px; color: var(--text-secondary); margin-bottom: 14px; font-family: var(--font-mono); }
    .chart-wrap { position: relative; height: 200px; }

    .bench-section-title { font-size: 15px; font-weight: 700; color: var(--text-primary); margin: 8px 0 14px; }
    .bench-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
    .bench-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: var(--radius-sm); padding: 16px; }
    .bench-card-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-secondary); margin-bottom: 10px; font-family: var(--font-mono); display: flex; align-items: center; gap: 6px; }
    .bench-color-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .bench-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; border-bottom: 1px solid var(--border-subtle); }
    .bench-row:last-child { border-bottom: none; }
    .bench-rank { font-size: 10px; color: var(--text-tertiary); min-width: 18px; font-family: var(--font-mono); }
    .bench-model { flex: 1; font-size: 12px; color: var(--text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bench-val { font-size: 12px; font-weight: 700; font-family: var(--font-mono); flex-shrink: 0; min-width: 36px; text-align: right; }
    .bench-bar-wrap { height: 2px; background: var(--bar-empty); border-radius: 1px; overflow: hidden; margin-top: 2px; }
    .bench-bar-fill { height: 100%; border-radius: 1px; transition: width 0.6s cubic-bezier(.4,0,.2,1); }

    .no-data { text-align: center; padding: 48px; color: var(--text-secondary); }

    @media (max-width: 768px) {
      .insights-grid { grid-template-columns: repeat(2,1fr); }
      .charts-grid   { grid-template-columns: 1fr; }
      .bench-grid    { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 480px) {
      .insights-grid { gap: 8px; }
      .insight-card  { padding: 12px; }
      .bench-grid    { grid-template-columns: 1fr; }
    }
  </style>
  <script src="app.js"></script>
</head>
<body>

<header class="header" id="app-bar">
  <div class="header-content">
    <a href="index.html" class="logo" style="padding-left:0;margin-left:0;">
      <img src="media/L_logo.png" alt="Klyxe logo" class="logo-icon" style="margin-left:0;">
      <span style="font-size:17px;font-weight:700;letter-spacing:-0.02em;">Klyxe</span>
    </a>
    <div style="flex:1;"></div>
    <div class="theme-switch-wrap">
      <span class="theme-switch-label" id="theme-label">Dark</span>
      <label class="theme-switch" aria-label="Toggle theme">
        <input type="checkbox" id="theme-toggle">
        <span class="theme-switch-track"></span>
        <span class="theme-switch-thumb" id="thumb-icon"></span>
      </label>
    </div>
  </div>
</header>

<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="app-layout">
  <!-- Left sidebar -->
  <lex-sidebar></lex-sidebar>

  <!-- Main content -->
  <div class="sidebar-main">

<div class="page-hero">
  <div class="page-hero-inner">
    <h1 style="font-family:var(--font-sans);font-size:28px;font-weight:700;color:var(--text-primary);letter-spacing:-0.03em;margin:0 0 6px 0;">Trends</h1>
    <p style="font-size:13px;color:var(--text-secondary);max-width:560px;line-height:1.6;margin:0;">Score comparisons within each size tier — Large vs Large, Medium vs Medium, Small vs Small. Scores are normalized per tier, so cross-tier comparisons are not meaningful.</p>
  </div>
</div>

<main class="container">
  <div id="tier-large" class="tier-section"></div>
  <div id="tier-medium" class="tier-section"></div>
  <div id="tier-small" class="tier-section"></div>
</main>

<div style="border-top:1px solid var(--border);margin-top:48px;">

<footer class="footer">
    <div class="footer-links">
      <a href="https://skillichse.github.io/Klyxe/" class="footer-link">GitHub</a>
      <a href="about.html" class="footer-link">About</a>
      <a href="news.html" class="footer-link">News</a>
    </div>
    <div class="footer-copy">Open source · Updated daily via GitHub Actions</div>
  </footer>
</div>

<script>
var TIER_LABELS = { large: 'Large (50B+)', medium: 'Medium (10–50B)', small: 'Small (≤10B)' };
var BENCH = [
  { key:'code',        label:'HumanEval — Code',  color:'#6366f1', fn:function(m){ return m.tests&&m.tests.code?m.tests.code.avg_score||0:0; } },
  { key:'reasoning',   label:'GSM8K — Reasoning', color:'#3b82f6', fn:function(m){ return m.tests&&m.tests.reasoning?m.tests.reasoning.score||0:0; } },
  { key:'instruction', label:'MMLU — Knowledge',  color:'#06b6d4', fn:function(m){ return m.tests&&m.tests.instruction?m.tests.instruction.avg_score||0:0; } },
  { key:'translation', label:'Translation',        color:'#10b981', fn:function(m){ return m.tests&&m.tests.translation?m.tests.translation.avg_score||0:0; } },
  { key:'speed',       label:'Speed (tok/s)',       color:'#f59e0b', fn:function(m){ return m.raw_speed||0; } },
];

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function short(n,max){ max=max||20; return n.length>max?n.slice(0,max-1)+'…':n; }
function isDark(){ return document.documentElement.getAttribute('data-theme')!=='light'; }
function gridC(){ return isDark()?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.06)'; }
function labelC(){ return isDark()?'rgba(255,255,255,0.45)':'rgba(0,0,0,0.45)'; }
function ttBg(){ return isDark()?'rgba(15,20,30,0.95)':'rgba(255,255,255,0.97)'; }
function ttColor(){ return isDark()?'#e8eaed':'#111827'; }

var chartInstances=[];

function buildChart(canvasId, labels, data, colors, yMax, tips) {
  var ctx=document.getElementById(canvasId);
  if(!ctx) return;
  var bgColors=labels.map(function(_,i){ return colors[i%colors.length]+'cc'; });
  var bdColors=labels.map(function(_,i){ return colors[i%colors.length]; });
  var c=new Chart(ctx,{
    type:'bar',
    data:{
      labels:labels,
      datasets:[{ data:data, backgroundColor:bgColors, borderColor:bdColors, borderWidth:1, borderRadius:6, borderSkipped:false }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:ttBg(), titleColor:ttColor(), bodyColor:ttColor(),
          borderColor:isDark()?'rgba(255,255,255,0.1)':'rgba(0,0,0,0.1)',
          borderWidth:1, padding:10, cornerRadius:8, displayColors:false,
          callbacks:{
            title:function(items){ return labels[items[0].dataIndex]||''; },
            label:function(item){
              var lines=[item.raw+(yMax===100?'/100':' tok/s')];
              if(tips&&tips[item.dataIndex]) lines.push(tips[item.dataIndex]);
              return lines;
            }
          }
        }
      },
      scales:{
        y:{ beginAtZero:true, max:yMax||undefined, grid:{color:gridC()}, border:{display:false}, ticks:{color:labelC(),font:{size:10},maxTicksLimit:5} },
        x:{ grid:{display:false}, border:{display:false}, ticks:{color:labelC(),font:{size:10},maxRotation:30,maxTicksLimit:12} }
      },
      animation:{duration:700,easing:'easeOutQuart'}
    }
  });
  chartInstances.push(c);
}

function buildTier(tier, models) {
  var el=document.getElementById('tier-'+tier);
  var baseColor={large:'#6366f1',medium:'#3b82f6',small:'#10b981'}[tier];
  var multiColors=[baseColor, baseColor+'bb', baseColor+'88', baseColor+'66', baseColor+'55'];

  el.innerHTML='<div class="tier-heading reveal">'
    +'<span class="tier-dot '+tier+'"></span>'
    +'<span class="tier-heading-name">'+TIER_LABELS[tier]+'</span>'
    +'<span class="tier-heading-sub">'+models.length+' model'+(models.length!==1?'s':'')+'</span>'
    +'</div>';

  if(!models.length){ el.innerHTML+='<div class="no-data">No '+TIER_LABELS[tier]+' models in this run.</div>'; return; }

  var sorted=[].concat(models).sort(function(a,b){ return (b.quality_score||0)-(a.quality_score||0); });
  var sortedSpd=[].concat(models).sort(function(a,b){ return (b.raw_speed||0)-(a.raw_speed||0); });
  var fastest=sortedSpd[0];
  var avgQ=models.reduce(function(s,m){ return s+(m.quality_score||0); },0)/models.length;
  var fullR=models.filter(function(m){ return m.tests_completed===5; }).length;

  // Insight cards
  var html='<div class="insights-grid reveal">'
    +'<div class="insight-card"><div class="insight-label">Top scorer</div>'
    +'<div class="insight-value" title="'+esc(sorted[0].model_name)+'"><em>'+esc(short(sorted[0].model_name,18))+'</em></div>'
    +'<div class="insight-sub">'+esc(sorted[0].provider)+' · '+Math.round(sorted[0].quality_score||0)+'/100</div></div>'
    +'<div class="insight-card"><div class="insight-label">Fastest</div>'
    +'<div class="insight-value" title="'+esc(fastest.model_name)+'"><em>'+esc(short(fastest.model_name,18))+'</em></div>'
    +'<div class="insight-sub">'+esc(fastest.provider)+' · '+Math.round(fastest.raw_speed||0)+' tok/s</div></div>'
    +'<div class="insight-card"><div class="insight-label">Avg quality</div>'
    +'<div class="insight-value"><em>'+Math.round(avgQ)+'</em><span style="font-size:13px;color:var(--text-secondary);font-weight:400;"> /100</span></div>'
    +'<div class="insight-sub">across '+models.length+' model'+(models.length!==1?'s':'')+'</div></div>'
    +'<div class="insight-card"><div class="insight-label">Full tests</div>'
    +'<div class="insight-value"><em>'+fullR+'</em><span style="font-size:13px;color:var(--text-secondary);font-weight:400;"> /'+models.length+'</span></div>'
    +'<div class="insight-sub">completed all 5 benchmarks</div></div>'
    +'</div>';

  // Two consistent charts
  var qId='chart-q-'+tier, sId='chart-s-'+tier;
  html+='<div class="charts-grid reveal">'
    +'<div class="chart-card"><div class="chart-card-title">Quality Score</div>'
    +'<div class="chart-card-sub">Overall score 0–100 · best to worst</div>'
    +'<div class="chart-wrap"><canvas id="'+qId+'"></canvas></div></div>'
    +'<div class="chart-card"><div class="chart-card-title">Speed (tok/s)</div>'
    +'<div class="chart-card-sub">Tokens per second · fastest to slowest</div>'
    +'<div class="chart-wrap"><canvas id="'+sId+'"></canvas></div></div>'
    +'</div>';

  // Benchmark breakdown
  html+='<div class="bench-section-title reveal">Benchmark Breakdown</div><div class="bench-grid">';
  BENCH.forEach(function(bench){
    var ranked=[].concat(models)
      .map(function(m){ return {name:m.model_name,provider:m.provider,score:bench.fn(m)}; })
      .filter(function(m){ return m.score>0; })
      .sort(function(a,b){ return b.score-a.score; });
    if(!ranked.length) return;
    var maxS=ranked[0].score, isSpd=bench.key==='speed';
    html+='<div class="bench-card reveal"><div class="bench-card-label">'
      +'<span class="bench-color-dot" style="background:'+bench.color+'"></span>'+bench.label+'</div>';
    ranked.forEach(function(m,i){
      var pct=maxS>0?m.score/maxS*100:0;
      var display=isSpd?Math.round(m.score)+' t/s':Math.round(m.score);
      var vc=isSpd?bench.color:(m.score>=75?'#10b981':m.score>=40?'#f59e0b':'#ef4444');
      html+='<div class="bench-row"><span class="bench-rank">#'+(i+1)+'</span>'
        +'<div style="flex:1;min-width:0;">'
        +'<div style="display:flex;align-items:center;gap:4px;">'
        +'<span class="bench-model" title="'+esc(m.name)+'">'+esc(short(m.name))+'</span>'
        +'<span class="bench-val" style="color:'+vc+'">'+display+'</span>'
        +'</div>'
        +'<div class="bench-bar-wrap"><div class="bench-bar-fill" style="width:'+pct+'%;background:'+bench.color+'"></div></div>'
        +'</div></div>';
    });
    html+='</div>';
  });
  html+='</div>';

  el.innerHTML+=html;

  requestAnimationFrame(function(){
    buildChart(qId,
      sorted.map(function(m){ return short(m.model_name); }),
      sorted.map(function(m){ return Math.round(m.quality_score||0); }),
      multiColors, 100,
      sorted.map(function(m){ return 'Provider: '+m.provider; }));
    buildChart(sId,
      sortedSpd.map(function(m){ return short(m.model_name); }),
      sortedSpd.map(function(m){ return Math.round(m.raw_speed||0); }),
      multiColors, null,
      sortedSpd.map(function(m){ return 'Provider: '+m.provider; }));
  });

  var io=new IntersectionObserver(function(entries){
    entries.forEach(function(e){ if(e.isIntersecting){e.target.classList.add('visible');io.unobserve(e.target);} });
  },{threshold:0.07});
  el.querySelectorAll('.reveal').forEach(function(r){ io.observe(r); });
}

function loadData(){
  fetch('data/results/leaderboard_speed.json')
    .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(function(all){
      var byTier={large:[],medium:[],small:[]};
      all.forEach(function(m){
        var t=m.tier||m.size_category||'medium';
        if(t==='unknown') t='medium';
        if(byTier[t]) byTier[t].push(m); else byTier.medium.push(m);
      });
      ['large','medium','small'].forEach(function(t){ buildTier(t,byTier[t]); });
    })
    .catch(function(e){
      console.error('loadData error:',e);
      ['large','medium','small'].forEach(function(t){
        var el=document.getElementById('tier-'+t);
        if(el) el.innerHTML='<div class="no-data">Failed to load data. Please refresh.</div>';
      });
    });
}

document.addEventListener('DOMContentLoaded',loadData);
</script>

<script>
(function(){
  var themeToggle=document.getElementById('theme-toggle');
  var themeLabel=document.getElementById('theme-label');
  function applyTheme(t){
    document.documentElement.setAttribute('data-theme',t);
    localStorage.setItem('theme',t);
    var isLight=t==='light';
    themeToggle.checked=isLight;
    themeLabel.textContent=isLight?'Light':'Dark';
  }
  applyTheme(localStorage.getItem('theme')||'dark');
  themeToggle.addEventListener('change',function(){ applyTheme(themeToggle.checked?'light':'dark'); });
  window.addEventListener('scroll',function(){
    var h=document.getElementById('app-bar');
    if(h) h.classList.toggle('scrolled',window.scrollY>0);
  });
})();
</script>

  </div><!-- /.sidebar-main -->
</div><!-- /.app-layout -->

  <script src="sidebar.js"></script>
</body>
</html>
