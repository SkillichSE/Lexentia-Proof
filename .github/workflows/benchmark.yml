name: AI Benchmark

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install requests feedparser

      - name: Llama 3.1 8B Instant (groq)
        continue-on-error: true
        timeout-minutes: 10
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: cd src && python benchmark.py --providers groq --models llama-3.1-8b

      - name: Llama 3.3 70B (groq)
        continue-on-error: true
        timeout-minutes: 10
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: cd src && python benchmark.py --providers groq --models llama-3.3-70b --merge

      - name: GPT-OSS 120B (groq)
        continue-on-error: true
        timeout-minutes: 10
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: cd src && python benchmark.py --providers groq --models gpt-oss-120b --merge

      - name: GPT-OSS 20B (groq)
        continue-on-error: true
        timeout-minutes: 10
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: cd src && python benchmark.py --providers groq --models gpt-oss-20b --merge

      - name: Llama 4 Scout 17B (groq)
        continue-on-error: true
        timeout-minutes: 10
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: cd src && python benchmark.py --providers groq --models llama-4-scout --merge

      - name: Llama 4 Maverick 17B (groq)
        continue-on-error: true
        timeout-minutes: 10
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: cd src && python benchmark.py --providers groq --models llama-4-maverick --merge

      - name: Qwen 3 32B (groq)
        continue-on-error: true
        timeout-minutes: 10
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: cd src && python benchmark.py --providers groq --models qwen3-32b --merge

      - name: Kimi K2 (groq)
        continue-on-error: true
        timeout-minutes: 10
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: cd src && python benchmark.py --providers groq --models kimi-k2 --merge

      - name: Llama 3.3 70B (openrouter)
        continue-on-error: true
        timeout-minutes: 12
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: cd src && python benchmark.py --providers openrouter --models llama-3.3-70b --merge

      - name: Step 3.5 Flash 196B (openrouter)
        continue-on-error: true
        timeout-minutes: 12
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: cd src && python benchmark.py --providers openrouter --models step-3.5-flash --merge

      - name: Nemotron 3 Super 120B (openrouter)
        continue-on-error: true
        timeout-minutes: 12
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: cd src && python benchmark.py --providers openrouter --models nemotron-super-120b --merge

      - name: Trinity Large 400B (openrouter)
        continue-on-error: true
        timeout-minutes: 12
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: cd src && python benchmark.py --providers openrouter --models trinity-large --merge

      - name: GPT-OSS 120B (openrouter)
        continue-on-error: true
        timeout-minutes: 12
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: cd src && python benchmark.py --providers openrouter --models gpt-oss-120b --merge

      - name: Qwen3 Coder 480B (openrouter)
        continue-on-error: true
        timeout-minutes: 12
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: cd src && python benchmark.py --providers openrouter --models qwen3-coder --merge

      - name: Qwen3 Next 80B (openrouter)
        continue-on-error: true
        timeout-minutes: 12
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: cd src && python benchmark.py --providers openrouter --models qwen3-next-80b --merge

      - name: MiniMax M2.5 (openrouter)
        continue-on-error: true
        timeout-minutes: 12
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: cd src && python benchmark.py --providers openrouter --models minimax-m2.5 --merge

      - name: GPT-OSS 20B (openrouter)
        continue-on-error: true
        timeout-minutes: 12
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: cd src && python benchmark.py --providers openrouter --models gpt-oss-20b --merge

      - name: Mistral Small 3.1 24B (openrouter)
        continue-on-error: true
        timeout-minutes: 12
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: cd src && python benchmark.py --providers openrouter --models mistral-small-3.1 --merge

      - name: Trinity Mini 26B (openrouter)
        continue-on-error: true
        timeout-minutes: 12
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: cd src && python benchmark.py --providers openrouter --models trinity-mini --merge

      - name: Nemotron 3 Nano 30B (openrouter)
        continue-on-error: true
        timeout-minutes: 12
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: cd src && python benchmark.py --providers openrouter --models nemotron-nano-30b --merge

      - name: GLM 4.5 Air (openrouter)
        continue-on-error: true
        timeout-minutes: 12
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: cd src && python benchmark.py --providers openrouter --models glm-4.5-air --merge

      - name: Nemotron Nano 9B (openrouter)
        continue-on-error: true
        timeout-minutes: 12
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: cd src && python benchmark.py --providers openrouter --models nemotron-nano-9b --merge

      - name: Llama 3.2 3B (openrouter)
        continue-on-error: true
        timeout-minutes: 12
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: cd src && python benchmark.py --providers openrouter --models llama-3.2-3b --merge

      - name: News
        continue-on-error: true
        run: cd src && python news_parser.py

      - name: Commit
        run: |
          git config user.name "Benchmark Bot"
          git config user.email "bot@benchmark.ai"
          git add docs/data/results/ || true
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "Benchmark — $(date +'%Y-%m-%d')"
            git push
            echo "Pushed"
          fi
