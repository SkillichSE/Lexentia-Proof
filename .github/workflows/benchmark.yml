name: AI Benchmark

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          echo "matrix={\"include\":[
            {\"provider\":\"groq\",\"models\":\"llama-3.1-8b,llama-3.3-70b,gpt-oss-120b,gpt-oss-20b,llama-4-scout,qwen3-32b,kimi-k2\",\"timeout\":12,\"keys\":\"GROQ_API_KEY\"},
            {\"provider\":\"openrouter\",\"models\":\"nemotron-super-120b,nemotron-nano-30b,nemotron-nano-12b,nemotron-nano-9b,trinity-large,trinity-mini\",\"timeout\":45,\"keys\":\"OPENROUTER_API_KEY_1,OPENROUTER_API_KEY_2,OPENROUTER_API_KEY_3,OPENROUTER_API_KEY_4,OPENROUTER_API_KEY_5,OPENROUTER_API_KEY_6,OPENROUTER_API_KEY_7,OPENROUTER_API_KEY_8,OPENROUTER_API_KEY_9,OPENROUTER_API_KEY_10\"},
            {\"provider\":\"openrouter\",\"models\":\"step-3.5-flash,gemma-3-27b,gemma-3-12b,gemma-3-4b,gemma-3n-e4b,gemma-3n-e2b\",\"timeout\":45,\"keys\":\"OPENROUTER_API_KEY_1,OPENROUTER_API_KEY_2,OPENROUTER_API_KEY_3,OPENROUTER_API_KEY_4,OPENROUTER_API_KEY_5,OPENROUTER_API_KEY_6,OPENROUTER_API_KEY_7,OPENROUTER_API_KEY_8,OPENROUTER_API_KEY_9,OPENROUTER_API_KEY_10\"},
            {\"provider\":\"openrouter\",\"models\":\"lfm-2.5-instruct,lfm-2.5-thinking,llama-3.3-70b,llama-3.2-3b,qwen3-coder,qwen3-next-80b\",\"timeout\":45,\"keys\":\"OPENROUTER_API_KEY_1,OPENROUTER_API_KEY_2,OPENROUTER_API_KEY_3,OPENROUTER_API_KEY_4,OPENROUTER_API_KEY_5,OPENROUTER_API_KEY_6,OPENROUTER_API_KEY_7,OPENROUTER_API_KEY_8,OPENROUTER_API_KEY_9,OPENROUTER_API_KEY_10\"},
            {\"provider\":\"openrouter\",\"models\":\"qwen3-4b,mistral-small-3.1,hermes-405b,dolphin-mistral-24b,glm-4.5-air,gpt-oss-120b-openrouter\",\"timeout\":45,\"keys\":\"OPENROUTER_API_KEY_1,OPENROUTER_API_KEY_2,OPENROUTER_API_KEY_3,OPENROUTER_API_KEY_4,OPENROUTER_API_KEY_5,OPENROUTER_API_KEY_6,OPENROUTER_API_KEY_7,OPENROUTER_API_KEY_8,OPENROUTER_API_KEY_9,OPENROUTER_API_KEY_10\"},
            {\"provider\":\"openrouter\",\"models\":\"gpt-oss-20b-openrouter,minimax-m2.5,llama-3.1-405b-or,llama-3.1-70b-or,llama-3.1-8b-or\",\"timeout\":45,\"keys\":\"OPENROUTER_API_KEY_1,OPENROUTER_API_KEY_2,OPENROUTER_API_KEY_3,OPENROUTER_API_KEY_4,OPENROUTER_API_KEY_5,OPENROUTER_API_KEY_6,OPENROUTER_API_KEY_7,OPENROUTER_API_KEY_8,OPENROUTER_API_KEY_9,OPENROUTER_API_KEY_10\"},
            {\"provider\":\"openrouter\",\"models\":\"llama-3.2-90b-or,llama-3.2-11b-or,llama-3.2-1b-or,deepseek-r1-or,deepseek-v3-or,qwen2.5-72b-or,qwen2.5-coder-32b-or,qwq-32b-or\",\"timeout\":45,\"keys\":\"OPENROUTER_API_KEY_1,OPENROUTER_API_KEY_2,OPENROUTER_API_KEY_3,OPENROUTER_API_KEY_4,OPENROUTER_API_KEY_5,OPENROUTER_API_KEY_6,OPENROUTER_API_KEY_7,OPENROUTER_API_KEY_8,OPENROUTER_API_KEY_9,OPENROUTER_API_KEY_10\"},
            {\"provider\":\"google\",\"models\":\"gemini-2.5-flash,gemini-2.5-flash-lite,gemma-3-27b-google\",\"timeout\":20,\"keys\":\"GOOGLE_API_KEY\"},
            {\"provider\":\"sambanova\",\"models\":\"llama-4-maverick,llama-4-scout-sn,llama-3.3-70b-sn,llama-3.1-405b-sn,llama-3.1-70b-sn,llama-3.1-8b-sn,deepseek-r1-sn,deepseek-v3-sn,qwen3-32b-sn,qwen2.5-72b-sn,qwen2.5-coder-32b-sn\",\"timeout\":20,\"keys\":\"SAMBANOVA_API_KEY\"},
            {\"provider\":\"cerebras\",\"models\":\"llama-3.1-8b,llama-3.3-70b,qwen3-32b,gpt-oss-120b,zai-glm-4.7,qwen3-235b\",\"timeout\":16,\"keys\":\"CEREBRAS_API_KEY\"},
            {\"provider\":\"together\",\"models\":\"llama-3.3-70b,llama-3.2-3b,deepseek-r1-free\",\"timeout\":16,\"keys\":\"TOGETHER_API_KEY\"}
          ]}" >> $GITHUB_OUTPUT

  benchmark:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 500
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
      max-parallel: 4  # Параллельно 4 батча, чтобы не перегрузить
      fail-fast: false  # Не останавливать, если один батч упал
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install requests feedparser

      - name: Benchmark — ${{ matrix.provider }} (${{ matrix.models }})
        continue-on-error: true
        timeout-minutes: ${{ matrix.timeout }}
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY_1: ${{ secrets.OPENROUTER_API_KEY_1 }}
          OPENROUTER_API_KEY_2: ${{ secrets.OPENROUTER_API_KEY_2 }}
          OPENROUTER_API_KEY_3: ${{ secrets.OPENROUTER_API_KEY_3 }}
          OPENROUTER_API_KEY_4: ${{ secrets.OPENROUTER_API_KEY_4 }}
          OPENROUTER_API_KEY_5: ${{ secrets.OPENROUTER_API_KEY_5 }}
          OPENROUTER_API_KEY_6: ${{ secrets.OPENROUTER_API_KEY_6 }}
          OPENROUTER_API_KEY_7: ${{ secrets.OPENROUTER_API_KEY_7 }}
          OPENROUTER_API_KEY_8: ${{ secrets.OPENROUTER_API_KEY_8 }}
          OPENROUTER_API_KEY_9: ${{ secrets.OPENROUTER_API_KEY_9 }}
          OPENROUTER_API_KEY_10: ${{ secrets.OPENROUTER_API_KEY_10 }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
        run: cd src && python benchmark.py --providers ${{ matrix.provider }} --models ${{ matrix.models }} --merge

  news-and-commit:
    needs: benchmark
    runs-on: ubuntu-latest
    if: always()  # Запуститься всегда, даже если какие-то батчи упали
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install requests feedparser

      - name: News
        continue-on-error: true
        run: cd src && python news_parser.py

      - name: Commit
        run: |
          git config user.name "Benchmark Bot"
          git config user.email "bot@benchmark.ai"
          git add docs/data/results/ || true
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "Benchmark — $(date +'%Y-%m-%d')"
            git push
            echo "Pushed"
          fi
